<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MJPEG Stream Viewer</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #f5f5f5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      background: #151515;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      gap: 10px;
      padding: 12px;
      background: #222;
      border-bottom: 1px solid #333;
    }

    label {
      display: grid;
      gap: 4px;
      font-size: 12px;
      color: #cfcfcf;
    }

    input {
      height: 34px;
      min-width: 110px;
      padding: 6px 8px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #111;
      color: #f5f5f5;
      font: inherit;
    }

    input[name="path"] {
      min-width: 80px;
    }

    button {
      height: 34px;
      padding: 0 12px;
      border: 1px solid #4b4b4b;
      border-radius: 6px;
      background: #303030;
      color: #f5f5f5;
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      background: #3b3b3b;
    }

    .zoom-value {
      min-width: 56px;
      text-align: center;
      color: #e0e0e0;
      line-height: 34px;
    }

    .stage {
      overflow: auto;
      display: grid;
      place-items: center;
      min-height: 0;
      background: #0b0b0b;
    }

    .stream {
      display: block;
      max-width: none;
      transform-origin: center center;
      image-rendering: auto;
    }

    .empty {
      color: #aaa;
      padding: 24px;
      text-align: center;
    }
  </style>
</head>
<body>
  <form class="toolbar" id="stream-form">
    <label>
      IP/host
      <input name="host" value="127.0.0.1" autocomplete="off">
    </label>
    <label>
      Porta
      <input name="port" value="8080" inputmode="numeric" autocomplete="off">
    </label>
    <label>
      Path
      <input name="path" value="/" autocomplete="off">
    </label>
    <button type="submit">Conectar</button>
    <button type="button" id="disconnect">Parar</button>
    <button type="button" id="zoom-out">-</button>
    <span class="zoom-value" id="zoom-value">100%</span>
    <button type="button" id="zoom-in">+</button>
  </form>

  <main class="stage" id="stage">
    <div class="empty" id="empty">Configure IP e porta, depois conecte ao stream HTTP MJPEG.</div>
    <img class="stream" id="stream" alt="MJPEG stream" hidden>
  </main>

  <script>
    const form = document.getElementById('stream-form');
    const stream = document.getElementById('stream');
    const empty = document.getElementById('empty');
    const zoomValue = document.getElementById('zoom-value');
    const zoomIn = document.getElementById('zoom-in');
    const zoomOut = document.getElementById('zoom-out');
    const disconnect = document.getElementById('disconnect');

    let zoom = 1;

    function normalizePath(path) {
      if (!path) return '/';
      return path.startsWith('/') ? path : `/${path}`;
    }

    function streamUrl() {
      const data = new FormData(form);
      const host = String(data.get('host') || '127.0.0.1').trim();
      const port = String(data.get('port') || '8080').trim();
      const path = normalizePath(String(data.get('path') || '/').trim());
      return `http://${host}:${port}${path}`;
    }

    function applyZoom() {
      stream.style.transform = `scale(${zoom})`;
      zoomValue.textContent = `${Math.round(zoom * 100)}%`;
    }

    function connect() {
      stream.src = `${streamUrl()}?t=${Date.now()}`;
      stream.hidden = false;
      empty.hidden = true;
    }

    function stop() {
      stream.removeAttribute('src');
      stream.hidden = true;
      empty.hidden = false;
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      connect();
    });

    disconnect.addEventListener('click', stop);

    zoomIn.addEventListener('click', () => {
      zoom = Math.min(4, zoom * 1.1);
      applyZoom();
    });

    zoomOut.addEventListener('click', () => {
      zoom = Math.max(0.25, zoom / 1.1);
      applyZoom();
    });

    applyZoom();
  </script>
</body>
</html>
