[stream]
# device: caminho da camera V4L2.
# Exemplos: /dev/video0, /dev/video1.
device=/dev/video0

# protocol: protocolo de transmissao.
# Opcoes: tcp, udp, http.
# tcp/http: mjpeg_tx escuta conexoes em host:port.
# udp: mjpeg_tx envia datagramas para host:port.
protocol=tcp

# host: IP literal de bind/destino.
# Opcoes comuns:
#   0.0.0.0  escuta em todas as interfaces IPv4
#   ::       escuta em IPv6 e tenta dual-stack quando o sistema permite
#   127.0.0.1 ou ::1  loopback local
#   192.168.x.x ou 2001:db8::1  IP especifico
# Alias aceito no INI: listen_host.
host=0.0.0.0

# port: porta TCP/UDP.
# Valores: 1 a 65535.
port=5000

# width/height: resolucao solicitada para a camera.
# Valores: inteiros positivos suportados pelo dispositivo.
width=1920
height=1080

# fps: quadros por segundo solicitados.
# Valores: inteiro positivo suportado pela camera.
fps=30

# quality: qualidade JPEG usada apenas no fallback RGB24/YUYV.
# Valores: 1 a 100. Em MJPEG nativo, a qualidade vem da camera/driver.
quality=80

# allow: controle de acesso para clientes TCP/HTTP.
# Sem allow, todos os clientes sao permitidos.
# Repetir allow para multiplas regras.
# Opcoes/formats aceitos:
#   all ou *                         permite todos
#   192.168.0.10                     IPv4 exato
#   192.168.0.20-192.168.0.30        range IPv4
#   10.0.0.0/24                      CIDR IPv4
#   ::1                              IPv6 exato
#   2001:db8::1-2001:db8::ffff       range IPv6
#   2001:db8::/32                    CIDR IPv6
# allow=all
# allow=192.168.0.10
# allow=192.168.0.20-192.168.0.30
# allow=10.0.0.0/24
# allow=::1
# allow=2001:db8::/32
