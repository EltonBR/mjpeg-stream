[stream]
# protocol: protocolo de recepcao.
# Opcoes: tcp, udp.
# tcp: mjpeg_rx conecta no transmissor em host:port.
# udp: mjpeg_rx escuta datagramas em listen_host:port.
protocol=tcp

# host: IP literal do transmissor usado no modo tcp.
# Opcoes comuns:
#   127.0.0.1 ou ::1  loopback local
#   192.168.x.x ou 2001:db8::1  IP especifico do transmissor
host=127.0.0.1

# listen_host: IP literal de bind usado no modo udp.
# Opcoes comuns:
#   0.0.0.0  escuta em todas as interfaces IPv4
#   ::       escuta em IPv6 e tenta dual-stack quando o sistema permite
#   127.0.0.1 ou ::1  loopback local
#   192.168.x.x ou 2001:db8::1  IP especifico
listen_host=0.0.0.0

# port: porta TCP/UDP.
# Valores: 1 a 65535.
port=5000

[window]
# lock_aspect: mantem a area da imagem na mesma proporcao do frame recebido.
# A proporcao e aplicada ao DrawingArea, compensando a barra superior da janela.
# Quando true, maximizar a janela fica desabilitado.
# Valores verdadeiros: 1, yes, true, on.
lock_aspect=true

[events]
# events_enabled: ativa envio de eventos de teclado/mouse/joystick.
# Valores verdadeiros: 1, yes, true, on.
# Valores falsos recomendados: 0, no, false, off.
# Se true, event_host e event_port precisam estar definidos.
events_enabled=true

# event_host: IP literal do servidor que recebe eventos JSON Lines por TCP.
# Opcoes comuns: 127.0.0.1, ::1, 192.168.x.x, 2001:db8::1.
event_host=127.0.0.1

# event_port: porta TCP do servidor de eventos.
# Valores: 1 a 65535.
event_port=6000

# joystick_enabled: ativa leitura de joystick Linux.
# Valores verdadeiros: 1, yes, true, on.
# Valores falsos recomendados: 0, no, false, off.
joystick_enabled=false

# joystick: caminho do dispositivo de joystick.
# Alias aceito no INI: joystick_device.
# Exemplos: /dev/input/js0, /dev/input/js1.
joystick=/dev/input/js0

[overlay]
# overlay: arquivo JSON opcional com elementos HUD/overlay.
# Se este arquivo nao existir no rx.ini padrao, o receptor segue sem overlay.
overlay=overlay.json

# hud_color: cor global do HUD. Opcoes: green, amber ou #rrggbb.
# Labels e linhas usam esta cor. PNGs devem ser coloridos com asset_colorize.
hud_color=#ffbf00

# hud_font: familia de fonte usada nos textos do HUD.
# Exemplos: Monospace, Sans, Serif.
hud_font=Monospace

# dim_color/dim_alpha: camada de leitura desenhada sobre o video e antes do HUD.
# Use dim_alpha=0 para desativar.
dim_color=#000000
dim_alpha=0.99

[telemetry]
# telemetry_enabled: ativa cliente TCP de telemetria JSON Lines.
# Valores verdadeiros: 1, yes, true, on.
telemetry_enabled=true

# telemetry_host: IP literal do servidor de telemetria.
telemetry_host=127.0.0.1

# telemetry_port: porta TCP do servidor de telemetria.
telemetry_port=7000
